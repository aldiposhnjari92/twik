<div class="flex flex-col items-center rounded-xl border border-dashed border-slate-200 bg-white px-6 py-16 text-center">
  <span class="flex h-12 w-12 items-center justify-center rounded-full bg-blue-50 text-blue-600">
    <i class="{{ icon() }} text-xl" aria-hidden="true"></i>
  </span>
  <h2 class="mt-4 text-base font-semibold tracking-tight text-slate-900">{{ title() }}</h2>
  <p class="mt-1.5 max-w-sm text-sm text-slate-500">{{ description() }}</p>
</div>
